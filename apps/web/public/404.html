<!-- GitHub Pages SPA routing workaround.
     When a user lands on a deep route (e.g. /docs/agents), GitHub Pages serves
     this 404.html. It redirects to /?redirect=/docs/agents which React Router
     then picks up and navigates to the correct route.
     See: https://github.com/rafgraph/spa-github-pages
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Nexus Studio</title>
    <script>
      // Single Page App redirect for GitHub Pages
      var pathSegmentsToKeep = 1; // Set to 0 for user.github.io, 1 for repo pages
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
