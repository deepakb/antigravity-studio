<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" aria-label="Nexus Studio favicon">
  <defs>
    <linearGradient id="ng" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="ng2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.65"/>
    </linearGradient>
  </defs>
  <!-- Connector lines -->
  <line x1="16" y1="16" x2="16" y2="4"  stroke="url(#ng2)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="16" y2="28" stroke="url(#ng2)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="5"  y2="9"  stroke="url(#ng2)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="27" y2="23" stroke="url(#ng2)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="27" y2="9"  stroke="url(#ng2)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="5"  y2="23" stroke="url(#ng2)" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Satellite nodes -->
  <circle cx="16" cy="4"  r="2"   fill="none" stroke="url(#ng)" stroke-width="1.2"/>
  <circle cx="16" cy="28" r="2"   fill="none" stroke="url(#ng)" stroke-width="1.2"/>
  <circle cx="5"  cy="9"  r="2"   fill="none" stroke="url(#ng)" stroke-width="1.2"/>
  <circle cx="27" cy="23" r="2"   fill="none" stroke="url(#ng)" stroke-width="1.2"/>
  <circle cx="27" cy="9"  r="2"   fill="none" stroke="url(#ng)" stroke-width="1.2"/>
  <circle cx="5"  cy="23" r="2"   fill="none" stroke="url(#ng)" stroke-width="1.2"/>
  <!-- Central node -->
  <circle cx="16" cy="16" r="6" fill="url(#ng)"/>
  <!-- N letterform -->
  <path d="M13.5 13.5v5l5-5v5" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
