<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none" aria-label="Nexus Studio">
  <defs>
    <linearGradient id="ng" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="ng2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- ── Mark (48×48 grid, left-anchored) ──────────────────────────── -->
  <!-- Connector lines -->
  <line x1="24" y1="24" x2="24" y2="6"  stroke="url(#ng2)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="24" y2="42" stroke="url(#ng2)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="8"  y2="14" stroke="url(#ng2)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="40" y2="34" stroke="url(#ng2)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="40" y2="14" stroke="url(#ng2)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="8"  y2="34" stroke="url(#ng2)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Satellite nodes -->
  <circle cx="24" cy="6"  r="3" fill="none" stroke="url(#ng)" stroke-width="1.5"/>
  <circle cx="24" cy="42" r="3" fill="none" stroke="url(#ng)" stroke-width="1.5"/>
  <circle cx="8"  cy="14" r="3" fill="none" stroke="url(#ng)" stroke-width="1.5"/>
  <circle cx="40" cy="34" r="3" fill="none" stroke="url(#ng)" stroke-width="1.5"/>
  <circle cx="40" cy="14" r="3" fill="none" stroke="url(#ng)" stroke-width="1.5"/>
  <circle cx="8"  cy="34" r="3" fill="none" stroke="url(#ng)" stroke-width="1.5"/>
  <!-- Central node -->
  <circle cx="24" cy="24" r="8" fill="url(#ng)"/>
  <!-- N letterform -->
  <path d="M20 20.5v7l8-7v7" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- ── Wordmark ───────────────────────────────────────────────────── -->
  <text
    x="58"
    y="31"
    font-family="Inter, ui-sans-serif, sans-serif"
    font-size="18"
    font-weight="700"
    letter-spacing="-0.5"
    fill="url(#tg)"
  >Nexus Studio</text>
</svg>
